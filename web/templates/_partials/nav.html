{# nav.html — Floating pill navbar partial. Used across all pages. #}
<nav class="nav" role="navigation" aria-label="Primary">
  <a class="nav__brand" href="/">
    <span class="nav__brand-mark">C</span>
    <span class="nav__brand-name">Clip<span class="accent">Auto</span><span class="registered">®</span></span>
  </a>

  <div class="nav__center" role="tablist" aria-label="Workspaces">
    <a class="nav__link {% if active == 'subtitle' %}is-active{% endif %}" href="/auto-subtitle">
      <span class="nav__link-dot"></span>Auto Subtitle
    </a>
    <a class="nav__link {% if active == 'clipfinder' %}is-active{% endif %}" href="/clip-finder">
      <span class="nav__link-dot"></span>Clip Finder
    </a>
    <a class="nav__link {% if active == 'shortmaker' %}is-active{% endif %}" href="/short-maker">
      <span class="nav__link-dot"></span>Short Maker
    </a>
    <a class="nav__link {% if active == 'editor' %}is-active{% endif %}" href="/editor">
      <span class="nav__link-dot"></span>Editor
    </a>
  </div>

  <div class="nav__right">
    <button type="button" class="nav__status" id="systemStatus" data-state="warn"
            aria-haspopup="dialog" aria-expanded="false" aria-controls="systemStatusPopup">
      <span class="dot"></span>
      <span class="status-text">Checking system…</span>
    </button>

    <div class="nav__status-popup" id="systemStatusPopup" role="dialog" aria-label="System status" hidden>
      <div class="nav__status-popup-head">
        <span class="nav__status-popup-title">System status</span>
        <span class="nav__status-popup-state" id="systemStatusPopupState">Checking…</span>
      </div>
      <div class="nav__status-popup-grid" id="systemStatusPopupGrid">
        <div class="nav__status-popup-row is-loading"><span>Loading…</span><span>—</span></div>
      </div>
      <div class="nav__status-popup-section" id="systemStatusPopupQuota">
        <div class="nav__status-popup-section-title">ElevenLabs · API quota</div>
        <div class="nav__status-popup-section-body" id="systemStatusPopupQuotaBody">
          <div class="nav__status-popup-row is-loading"><span>Loading quota…</span><span>—</span></div>
        </div>
      </div>
      <div class="nav__status-popup-section" id="systemStatusPopupGeminiQuota">
        <div class="nav__status-popup-section-title">Gemini · API quota</div>
        <div class="nav__status-popup-section-body" id="systemStatusPopupGeminiQuotaBody">
          <div class="nav__status-popup-row is-loading"><span>Loading quota…</span><span>—</span></div>
        </div>
      </div>
    </div>

    <button class="nav__menu-btn" id="navMenuBtn" aria-label="Open menu" aria-controls="navSheet" aria-expanded="false">
      <span></span>
    </button>
  </div>
</nav>
